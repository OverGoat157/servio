services:
  # PostgreSQL — база данных AB Team
  postgres:
    image: postgres:16-alpine
    container_name: ab-team-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: abteam
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: abteam
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Backend API
  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: abteam
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: abteam
      DB_SSLMODE: disable
      JWT_SECRET: ${JWT_SECRET}
      SERVER_PORT: 8080
      MENU_BASE_URL: ${MENU_BASE_URL:-}
    volumes:
      - uploads:/app/uploads
    depends_on:
      - postgres

  # Frontend — Публичное меню
  menu:
    build:
      context: ./frontend/menu
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    restart: unless-stopped
    ports:
      - "3000:80"

  # Frontend — Admin панель
  admin:
    build:
      context: ./frontend/admin
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    restart: unless-stopped
    ports:
      - "3001:80"

volumes:
  pgdata:
  uploads:
